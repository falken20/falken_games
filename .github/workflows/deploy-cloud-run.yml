name: Deploy To Cloud Run

on:
  workflow_run:
    workflows: ["Quality Checks"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: falken-games
  GCP_REGION: europe-west1
  SERVICE_NAME: falken-games
  AR_REPOSITORY: falken-games
  AR_HOST: europe-west1-docker.pkg.dev
  IMAGE_NAME: falken-games

jobs:
  deploy:
    name: Build and deploy to Cloud Run
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'master' &&
        github.event.workflow_run.event == 'push'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth for Artifact Registry
        run: |
          gcloud auth configure-docker "$AR_HOST" --quiet

      - name: Build and push image
        run: |
          IMAGE_URI="$AR_HOST/$GCP_PROJECT_ID/$AR_REPOSITORY/$IMAGE_NAME:${GITHUB_SHA}"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --platform managed \
            --image "$IMAGE_URI" \
            --allow-unauthenticated