name: Quality Checks

permissions:
  contents: write

on:
  push:
  pull_request:

jobs:
  backend-quality:
    name: Backend tests + linter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: |
          pytest --cov=app --cov-report=term --cov-report=json:coverage.json
          
      - name: Extract coverage percentage
        id: coverage
        run: |
          coverage_pct=$(python -c "import json; data=json.load(open('coverage.json')); print(int(round(data['totals']['percent_covered'])))")
          echo "coverage_pct=$coverage_pct" >> $GITHUB_OUTPUT
          echo "Coverage: $coverage_pct%"

      - name: Update README badges (master branch only)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          cd ..

          # Update release and coverage badges in README
          python3 << EOF
          import re
          from urllib.parse import quote
          
          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()

          with open('VERSION', 'r', encoding='utf-8') as f:
            version = f.read().strip()
          version_encoded = quote(version, safe='')
          
          coverage_pct = ${{ steps.coverage.outputs.coverage_pct }}

          # Replace release badge
          release_pattern = r'<img src="https://img\.shields\.io/badge/release-[^"]+-blue"'
          release_replacement = f'<img src="https://img.shields.io/badge/release-{version_encoded}-blue"'
          content = re.sub(release_pattern, release_replacement, content)
          
          # Replace coverage badge
          pattern = r'<img src="https://img\.shields\.io/badge/coverage-\d+%25-green"'
          replacement = f'<img src="https://img.shields.io/badge/coverage-{coverage_pct}%25-green"'
          content = re.sub(pattern, replacement, content)
          
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(content)
          
          print(f"Updated release badge to {version}")
          print(f"Updated coverage badge to {coverage_pct}%")
          EOF

      - name: Commit and push badge updates
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update badges [skip ci]"
            git push
          fi

      - name: Run linter
        run: flake8 app tests

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
